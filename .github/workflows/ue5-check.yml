name: UE5 Check

on:
  push:
    paths:
      - "speaki_backrooms/**"
  pull_request:
    paths:
      - "speaki_backrooms/**"

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Fix workspace permissions
        run: chmod -R 777 $GITHUB_WORKSPACE

      - name: Compile in UE5 container
        run: |
          docker run --rm \
            -v $GITHUB_WORKSPACE:/workspace \
            ghcr.io/epicgames/unreal-engine:dev-slim-5.7.4 \
            /home/ue4/UnrealEngine/Engine/Build/BatchFiles/Linux/Build.sh \
              speaki_backrooms Linux Development \
              /workspace/speaki_backrooms/speaki_backrooms.uproject \
              -WaitMutex -NoHotReloadFromIDE
